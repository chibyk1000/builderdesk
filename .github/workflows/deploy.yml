name: Deploy buildersdesk

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Node.js on runner
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # Install dependencies and build on GitHub Actions runner
      - name: Install dependencies and build
        run: |
          set -e
          npm ci
          npm run build

      # Copy SSH key and configure
      - name: Setup SSH
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Push only the build output and required runtime files to VPS
      - name: Sync build to VPS
        run: |
          set -e
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            mkdir -p ${{ secrets.APP_PATH }}/.next
            mkdir -p ${{ secrets.APP_PATH }}/public
          "

          rsync -az --delete \
            .next/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.APP_PATH }}/.next/

          rsync -az --delete \
            public/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.APP_PATH }}/public/

          rsync -az \
            package.json \
            next.config.* \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.APP_PATH }}/

      # Install production dependencies on VPS and restart app
      - name: Install prod deps and restart on VPS
        run: |
          set -e
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd ${{ secrets.APP_PATH }}
            npm ci --omit=dev
            cd /home/${{ secrets.VPS_USER }}/${{ secrets.APP_NAME }}
            pm2 restart ${{ secrets.APP_NAME }}
            pm2 save
          "